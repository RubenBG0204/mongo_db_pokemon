<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Pokémon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% include "partials/navbar.html" %}

    <main class="container narrow">
        <h1>Editar Pokémon</h1>

        <form class="form" method="POST" action="{{ url_for('pokemon.edit_route', pokemon_id=pokemon._id) }}">
            <label>Número Pokédex
                <input type="number" name="pokedex_number" value="{{ pokemon.pokedex_number }}" required>
            </label>

            <label>Nombre
                <input type="text" name="name" value="{{ pokemon.name }}" required>
            </label>

            <label>Altura en metros
                <input type="number" step="0.1" name="height" value="{{ pokemon.height }}" required>
            </label>

            <label>Peso en kilos
                <input type="number" step="0.1" name="weight" value="{{ pokemon.weight }}" required>
            </label>

            <label>Tipos separados por coma
                <input type="text" name="types" value="{{ pokemon.types|join(', ') }}" required>
            </label>

            <label>Habilidades separadas por coma
                <input type="text" name="abilities" value="{{ pokemon.abilities|join(', ') }}">
            </label>

            <label>Descripción
                <textarea name="description" rows="4">{{ pokemon.description }}</textarea>
            </label>

            <label>URL sprite
                <input type="url" name="sprite" value="{{ pokemon.sprite }}">
            </label>

            <label class="checkbox">
                <input type="checkbox" name="is_legendary" {% if pokemon.is_legendary %}checked{% endif %}>
                Es legendario
            </label>

            <label class="checkbox">
                <input type="checkbox" name="is_mythical" {% if pokemon.is_mythical or pokemon.pokedex_number == 151 %}checked{% endif %}>
                Es singular
            </label>

            <label class="checkbox">
                <input type="checkbox" name="can_mega_evolve" {% if pokemon.can_mega_evolve %}checked{% endif %}>
                Puede mega-evolucionar
            </label>

            <fieldset>
                <legend>Stats</legend>
                <input type="number" name="hp" placeholder="HP" value="{{ pokemon.stats.hp }}">
                <input type="number" name="attack" placeholder="Ataque" value="{{ pokemon.stats.attack }}">
                <input type="number" name="defense" placeholder="Defensa" value="{{ pokemon.stats.defense }}">
                <input type="number" name="special_attack" placeholder="Ataque especial" value="{{ pokemon.stats.special_attack or 0 }}">
                <input type="number" name="special_defense" placeholder="Defensa especial" value="{{ pokemon.stats.special_defense or 0 }}">
                <input type="number" name="speed" placeholder="Velocidad" value="{{ pokemon.stats.speed }}">
            </fieldset>

            <div class="actions">
                <button class="button primary" type="submit">Actualizar</button>
                <a class="button" href="{{ url_for('pokemon.list_pokemon_route') }}">Cancelar</a>
            </div>
        </form>
    </main>
</body>
</html>
